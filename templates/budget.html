<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Budget & Operations</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/budget_style.css') }}">
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>
        <h1>MIT-WPU Physical Education & Sports</h1>
        
        <h2 class="sub-header">Budget Utilization 2025-26</h2>
        <h3 class="total-budget-label">Total Budget: ₹ 98,99,668</h3>
        
        <div class="chart-section">
            <h3 class="chart-title">Total Budget Utilization</h3>
            <div id="totalUtilizationChart"></div>
        </div>

        <div class="charts-row">
            <div class="col-small">
                <h3 class="chart-title">Funds Distribution (Category-wise)</h3>
                <div id="budgetPieChart"></div>
            </div>

            <div class="col-large">
                <h3 class="chart-title">Breakdown of Budget Utilization</h3>
                <div id="budgetStackChart"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/budget_script.js') }}"></script>
</body>
</html>
