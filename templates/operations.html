<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Operations</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/operations_style.css') }}">
</head>
<body>

    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>
        <div class="section-header">
            <h1 id="reportTitle">MIT-WPU Monthly Sports Operations Report</h1>
            <div class="selector-group">
                <label for="monthSelector" class="selector-label">Select Month:</label>
                <select id="monthSelector" onchange="fetchAndRenderOperations(this.value)">
                    <option value="" disabled selected>Loading...</option>
                </select>
            </div>
        </div>

        <div class="chart-section">
            <h3 class="chart-title">Facility Capacity Utilization (Consumed vs Remaining)</h3>
            <div id="opsUsageChart"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/operations_script.js') }}"></script>
</body>
</html>
