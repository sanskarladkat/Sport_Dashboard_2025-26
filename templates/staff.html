<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Summit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/staff_style.css') }}">
</head>
<body>

<div class="container">
    <header class="header-row">
        <a href="/" class="back-btn">← Back to Home</a>
        <h1 class="main-title">MIT-WPU Staff Summit Performance Overview</h1>
        <div style="width: 120px;"></div>
    </header>
    
    <div class="top-grid">
        <div class="kpi-card"><h3>Total Participation</h3><h2 id="totalAch">0</h2></div>
        <div class="kpi-card"><h3>Total Points</h3><h2 id="totalPts">0</h2></div>
        
        <div class="kpi-card sidebar-card">
            <h3>Sport-Wise Winners</h3>
            <div id="sportButtonContainer" class="sport-btn-container">
                <p style="font-size: 0.8rem;">Loading sports...</p>
            </div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card"><h3>Department-wise Participants</h3><div id="deptBar"></div></div>
        <div class="chart-card"><h3>Total Points Department-wise</h3><div id="deptPointsBar"></div></div>
        <div class="chart-card full-width-card"><h3>Gender Distribution</h3><div id="genderDonut"></div></div>
    </div>

    <div class="list-section" id="listSection">
        <h2 id="listTitle"></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Faculty Name</th>
                        <th>Department Name</th>
                        <th>Gender</th>
                        <th>Event</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="winnerTableBody"></tbody>
            </table>
        </div>
        <button id="downloadBtn" class="excel-btn" onclick="downloadExcel()">Download Winners List (Excel)</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/staff_script.js') }}"></script>

</body>
</html>
