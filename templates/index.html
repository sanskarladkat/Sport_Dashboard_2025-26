<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIT-WPU Sports</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
</head>
<body>

    <header>
        <h1>MIT-WPU Sports and Gymkhana Dashboard</h1>
    </header>

    <div class="winners-section">
        <h2>🌟 MIT-WPU SPORTS CHAMPIONS 🌟</h2>
        <div class="slider-container">
            <div class="slider-track" id="sliderTrack">
                {% if winner_images %}
                    {% for img in winner_images %}
                    <div class="slide">
                        <img src="{{ url_for('static', filename='images/' + img) }}" alt="Winner">
                    </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
    
    <div class="nav-section">
        <div class="nav-grid">
            <a href="/achievements" class="nav-card">
                <div class="nav-icon"><i class="fas fa-trophy"></i></div>
                <div class="nav-title">Sports Achievements</div>
            </a>
            <div class="nav-card" onclick="openAuthModal()">
                <div class="nav-icon"><i class="fas fa-indian-rupee-sign"></i></div>
                <div class="nav-title">Sports Budget</div>
            </div>
            <a href="/operations" class="nav-card">
                <div class="nav-icon"><i class="fas fa-building"></i></div>
                <div class="nav-title">Facilities Uses</div>
            </a>
            <a href="/staff-summit" class="nav-card">
                <div class="nav-icon"><i class="fas fa-users"></i></div>
                <div class="nav-title">Staff Summit</div>
            </a>
            <a href="/inter_department" class="nav-card">
                <div class="nav-icon"><i class="fas fa-medal"></i></div>
                <div class="nav-title">Inter-Dept Achievements</div>
            </a>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <div class="modal-lock-icon"><i class="fas fa-lock"></i></div>
            <h2>Secure Access</h2>
            <input type="password" id="authInput" class="auth-input" placeholder="••••">
            <button onclick="checkPassword()" class="auth-submit">Verify</button>
            <p class="modal-cancel-text" onclick="document.getElementById('authModal').style.display='none'">[ CANCEL ]</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/index_script.js') }}"></script>
</body>
</html>
